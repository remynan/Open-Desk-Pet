<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'">
<title>Open Desk Pet</title>
<link rel="stylesheet" href="minicpm-onboarding.css">
</head>
<body>
<main class="wizard">
  <header class="steps" id="steps">
    <div class="step active" data-step="welcome"><span class="dot"><span class="num">1</span></span><span class="label" data-i18n="onboardingStepWelcome"></span></div>
    <div class="step" data-step="ready"><span class="dot"><span class="num">2</span></span><span class="label" data-i18n="onboardingStepReady"></span></div>
  </header>

  <section class="content">
    <!-- Step 1: welcome -->
    <div class="panel" data-panel="welcome">
      <h1 data-i18n="onboardingEnvWelcome"></h1>
      <p class="lede" data-i18n="onboardingApiConfigHint"></p>
      <div class="bottom">
        <button class="btn primary" id="welcome-next" data-i18n="onboardingNext"></button>
      </div>
    </div>

    <!-- Step 2: ready -->
    <div class="panel hidden" data-panel="ready">
      <h1 data-i18n="onboardingReadyTitle"></h1>
      <p class="lede" data-i18n="onboardingReadyLede"></p>
      <ul class="hotkeys">
        <li><kbd>⌘</kbd><kbd>⇧</kbd><kbd>M</kbd><span data-i18n="onboardingHotkeyToggleChat"></span></li>
        <li><kbd>⌘</kbd><kbd>⇧</kbd><kbd>T</kbd><span data-i18n="onboardingHotkeyToggleThinking"></span></li>
        <li><kbd>Esc</kbd><span data-i18n="onboardingHotkeyEscClose"></span></li>
      </ul>
      <p class="dim" data-i18n="onboardingMoreHint"></p>
      <div class="bottom">
        <button class="btn primary" id="ready-finish" data-i18n="onboardingFinish"></button>
      </div>
    </div>
  </section>
</main>
<script src="minicpm-i18n.js"></script>
<script src="minicpm-onboarding-renderer.js"></script>
</body>
</html>
