name: Build sidecar (gateway only)

# Builds the Python gateway for all platforms.
# Note: llama.cpp compilation has been removed - this project now uses
# remote OpenAI-compatible APIs for inference.

on:
  push:
    paths:
      - "minicpm-sidecar/**"
      - ".github/workflows/build-sidecar.yml"
  pull_request:
    paths:
      - "minicpm-sidecar/**"
      - ".github/workflows/build-sidecar.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            triple: mac-arm64
          - os: ubuntu-22.04
            triple: linux-x64
          - os: windows-2022
            triple: win-x64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.triple }}
    defaults:
      run:
        working-directory: minicpm-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        shell: bash
        if: runner.os != 'Windows'

      - name: Install uv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          Add-Content $env:GITHUB_PATH "$env:USERPROFILE\.local\bin"

      - name: Build gateway (PyInstaller)
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/build-gateway.sh

      - name: Build gateway (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          uv sync
          uv pip install "pyinstaller>=6.0"
          Push-Location build
          ../.venv/Scripts/pyinstaller.exe gateway.spec `
            --distpath ../build/dist --workpath ../build/build --clean --noconfirm
          Pop-Location
          New-Item -ItemType Directory -Force -Path "bin/${{ matrix.triple }}" | Out-Null
          Copy-Item -Force build/dist/minicpm-sidecar.exe "bin/${{ matrix.triple }}/"

      - name: Smoke test (gateway --help)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./bin/${{ matrix.triple }}/minicpm-sidecar.exe --help
          else
            ./bin/${{ matrix.triple }}/minicpm-sidecar --help
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: minicpm-sidecar/bin/${{ matrix.triple }}/
          if-no-files-found: error
          retention-days: 14
