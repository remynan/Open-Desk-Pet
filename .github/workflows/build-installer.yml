name: Build installer (Linux + Windows)

# 自动化打包 Linux / Windows 安装包，不依赖 git tag、不需要签名证书。
# 直接复用 build-sidecar.yml 已编译好的 llama-server + gateway artifact，
# 跳过 ~30 分钟的 llama.cpp 编译，只跑 electron-builder。
#
# 触发：
#   - 手动：Actions → Build installer → Run workflow（可指定 sidecar run id）
#   - push 到 main 且改了 clawd-on-desk/ 或本 workflow 文件
#
# 产物：
#   - linux-installer  (AppImage + deb)
#   - windows-installer (nsis exe)
#   保留 7 天，可在 Actions 页面或 `gh run download` 拉取。

on:
  workflow_dispatch:
    inputs:
      sidecar_run_id:
        description: "build-sidecar.yml 的 run id（留空 = 最近一次成功）"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "clawd-on-desk/**"
      - ".github/workflows/build-installer.yml"

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read   # 必需：跨 workflow 读取 build-sidecar 的 artifact

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    name: linux-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download sidecar artifact (linux-x64)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-sidecar.yml
          workflow_conclusion: success
          name: sidecar-linux-x64
          path: minicpm-sidecar/bin/linux-x64
          branch: main
          run_id: ${{ github.event.inputs.sidecar_run_id }}
          if_no_artifact_found: fail

      - name: Verify sidecar binaries
        working-directory: minicpm-sidecar/bin/linux-x64
        run: |
          ls -la
          chmod +x llama-server minicpm-sidecar
          ./llama-server --version
          ./minicpm-sidecar --help >/dev/null

      - name: npm install
        working-directory: clawd-on-desk
        run: npm install --no-audit --no-fund

      - name: electron-builder (AppImage + deb)
        working-directory: clawd-on-desk
        run: npx electron-builder --linux --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            clawd-on-desk/dist/*.AppImage
            clawd-on-desk/dist/*.deb
            clawd-on-desk/dist/latest-linux.yml
          if-no-files-found: error
          retention-days: 7

  build-windows:
    runs-on: windows-2022
    name: win-x64
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download sidecar artifact (win-x64)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-sidecar.yml
          workflow_conclusion: success
          name: sidecar-win-x64
          path: minicpm-sidecar/bin/win-x64
          branch: main
          run_id: ${{ github.event.inputs.sidecar_run_id }}
          if_no_artifact_found: fail

      - name: Verify sidecar binaries
        working-directory: minicpm-sidecar/bin/win-x64
        run: |
          Get-ChildItem
          .\llama-server.exe --version
          .\minicpm-sidecar.exe --help | Out-Null

      - name: npm install
        working-directory: clawd-on-desk
        shell: cmd
        run: npm install --no-audit --no-fund

      - name: electron-builder (nsis)
        working-directory: clawd-on-desk
        shell: cmd
        run: npx electron-builder --win --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            clawd-on-desk/dist/*.exe
            clawd-on-desk/dist/*.exe.blockmap
            clawd-on-desk/dist/latest.yml
          if-no-files-found: error
          retention-days: 7
